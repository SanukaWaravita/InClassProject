<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter Name</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Welcome</h1>
        <p>Please enter your name to receive a greeting.</p>
        <form id="nameForm">
            <div class="input-group">
                <input type="text" id="nameInput" placeholder="Enter your name" required autofocus>
                <div id="error" class="error-message"></div>
            </div>
            <button type="submit" id="submitBtn">Get Greeting</button>
        </form>
    </div>

    <script>
        const form = document.getElementById('nameForm');
        const nameInput = document.getElementById('nameInput');
        const errorDiv = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = nameInput.value.trim();
            errorDiv.textContent = '';

            try {
                const response = await fetch('/api/validate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = `/message.html?name=${encodeURIComponent(name)}`;
                } else {
                    errorDiv.textContent = data.message || 'Validation failed.';
                }
            } catch (err) {
                errorDiv.textContent = 'Something went wrong. Please try again.';
                console.error(err);
            }
        });
    </script>
</body>
</html>
